name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - "**.md"
  workflow_dispatch:
    inputs:
      build_type:
        description: "构建类型"
        required: false
        default: "release"
        type: choice
        options:
          - debug
          - release
      tag:
        description: "Git 标签名（填写则自动创建 GitHub Release）"
        required: false
        default: ""
        type: string

jobs:
  build:
    name: 构建 APK
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Prepare .env
        run: echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY || 'placeholder' }}" > .env

      - name: Write release key
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ -n "${{ secrets.SIGN_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.SIGN_KEYSTORE_BASE64 }}" | base64 --decode > my-upload-key.jks
          fi

      - name: Generate debug keystore
        run: |
          keytool -genkey -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build APK
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          if [ -z "$BUILD_TYPE" ] || [ "$BUILD_TYPE" = "release" ]; then
            gradle assembleRelease
          else
            gradle assembleDebug
          fi

      - name: Extract version
        shell: bash
        run: |
          ver=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "VERSION=${ver}" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: app-${{ env.VERSION }}
          path: app/build/outputs/apk/*/app-*.apk

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          name: ${{ github.event.inputs.tag }}
          files: app/build/outputs/apk/*/app-*.apk
